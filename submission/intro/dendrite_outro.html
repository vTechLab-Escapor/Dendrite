<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Dendrite — Outro</title>
<style>
  :root{
    --bg:#0D0D0D; --ink:#F5F5F5; --muted:#8E8E8F;
    --green:#10A37F; --green-bright:#19C37D;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1920px;height:1080px;background:var(--bg);overflow:hidden}
  .stage{position:relative;width:1920px;height:1080px;
    background:
      radial-gradient(820px 560px at 50% 38%, rgba(16,163,127,0.12), transparent 70%),
      radial-gradient(1400px 900px at 50% 46%, #131313, var(--bg) 75%);
    font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  svg{position:absolute;inset:0;width:1920px;height:1080px}

  .seg{stroke:var(--green);stroke-width:2.2;fill:none;stroke-linecap:round;
    stroke-dasharray:var(--l);stroke-dashoffset:var(--l);opacity:.55;
    filter:drop-shadow(0 0 4px rgba(25,195,125,.3));
    animation:draw var(--dur) cubic-bezier(.25,.7,.3,1) var(--delay) forwards;}
  .tip{transform-box:fill-box;transform-origin:center;transform:scale(0);opacity:0;
    animation:pop .5s cubic-bezier(.2,1.4,.4,1) var(--delay) forwards;}
  .root-core{fill:var(--green);transform-box:fill-box;transform-origin:center;
    transform:scale(0);animation:pop .6s cubic-bezier(.2,1.4,.4,1) .2s forwards;}
  @keyframes draw{to{stroke-dashoffset:0}}
  @keyframes pop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.2);opacity:1}100%{transform:scale(1);opacity:1}}
  @keyframes rise{to{opacity:1;transform:translateY(0)}}

  .word{position:absolute;left:0;right:0;top:418px;text-align:center}
  .word h1{font-size:120px;font-weight:700;letter-spacing:.26em;color:var(--ink);
    text-indent:.26em;opacity:0;transform:translateY(14px);
    animation:rise 1.1s cubic-bezier(.2,.7,.2,1) 1.2s forwards;}
  .word h1 .a{color:var(--green-bright)}
  .tag{position:absolute;left:0;right:0;top:578px;text-align:center;
    font-family:Georgia,"Times New Roman",serif;font-style:italic;
    font-size:36px;color:var(--muted);opacity:0;transform:translateY(12px);
    animation:rise 1.1s cubic-bezier(.2,.7,.2,1) 1.9s forwards;}

  .links{position:absolute;left:0;right:0;top:700px;text-align:center;
    opacity:0;transform:translateY(12px);
    animation:rise 1.1s cubic-bezier(.2,.7,.2,1) 3.1s forwards;}
  .links .row{display:inline-flex;gap:54px;align-items:center}
  .links .item{font-size:24px;color:var(--ink);letter-spacing:.02em}
  .links .lbl{display:block;font-size:14px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--green-bright);margin-bottom:8px;font-weight:600}
  .links .sep{width:1px;height:42px;background:#2a2a2a}
</style>
</head>
<body>
  <div class="stage">
    <svg id="svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid meet"></svg>
    <div class="word"><h1>DEN<span class="a">D</span>RITE</h1></div>
    <div class="tag">Think in branches, not lines.</div>
    <div class="links">
      <div class="row">
        <div class="item"><span class="lbl">Code</span>github.com/&lt;you&gt;/Dendrite</div>
        <div class="sep"></div>
        <div class="item"><span class="lbl">Live Demo</span>&lt;your-demo-url&gt;</div>
      </div>
    </div>
  </div>
<script>
const SVG="http://www.w3.org/2000/svg";
const svg=document.getElementById("svg");
const ROOT={x:960,y:300};
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const rnd=mulberry32(11); const jitter=m=>(rnd()*2-1)*m;
function curve(x1,y1,x2,y2){const dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy);const nx=-dy/len,ny=dx/len;const bow=len*0.16*(rnd()>.5?1:-1);return `M ${x1} ${y1} C ${x1+dx*0.35+nx*bow*0.6} ${y1+dy*0.35+ny*bow*0.6} ${x1+dx*0.7+nx*bow} ${y1+dy*0.7+ny*bow} ${x2} ${y2}`;}
const segs=[],tips=[];
function grow(x,y,angle,length,depth,delay){
  if(depth===0)return;
  const ex=x+Math.cos(angle)*length, ey=y-Math.sin(angle)*length;
  segs.push({d:curve(x,y,ex,ey),depth,delay});
  tips.push({x:ex,y:ey,depth,delay:delay+0.28});
  const n=depth>=3?3:2, spread=depth>=3?0.6:0.78;
  for(let i=0;i<n;i++){const t=n===1?0:(i-(n-1)/2);grow(ex,ey,angle+spread*t+jitter(0.12),length*0.7,depth-1,delay+0.4+i*0.05);}
}
// compact canopy fanning sideways/up, kept in the top third behind the wordmark
[2.5,2.0,1.55,1.14,0.64].forEach((a,i)=>grow(ROOT.x,ROOT.y,a,120,4,0.2+i*0.08));
const sg=document.createElementNS(SVG,"g"),tg=document.createElementNS(SVG,"g");
svg.appendChild(sg);svg.appendChild(tg);
segs.forEach(s=>{const p=document.createElementNS(SVG,"path");p.setAttribute("class","seg");p.setAttribute("d",s.d);sg.appendChild(p);p.style.setProperty("--l",p.getTotalLength());p.style.setProperty("--dur",(0.5+s.depth*0.05)+"s");p.style.setProperty("--delay",s.delay+"s");});
tips.forEach(t=>{const c=document.createElementNS(SVG,"circle");c.setAttribute("class","tip");c.setAttribute("cx",t.x);c.setAttribute("cy",t.y);c.setAttribute("r",Math.max(3,6-(4-t.depth)));c.setAttribute("fill",t.depth>=3?"#1C1C1E":"#10A37F");c.setAttribute("stroke","#19C37D");c.setAttribute("stroke-width",t.depth>=3?1.6:0);c.style.setProperty("--delay",t.delay+"s");c.style.filter="drop-shadow(0 0 4px rgba(25,195,125,.45))";tg.appendChild(c);});
const core=document.createElementNS(SVG,"circle");core.setAttribute("class","root-core");core.setAttribute("cx",ROOT.x);core.setAttribute("cy",ROOT.y);core.setAttribute("r",11);core.style.filter="drop-shadow(0 0 9px rgba(25,195,125,.7))";svg.appendChild(core);
document.fonts.ready.then(()=>requestAnimationFrame(()=>{window.__ready=true;}));
</script>
</body>
</html>
