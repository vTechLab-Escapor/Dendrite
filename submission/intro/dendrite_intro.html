<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Dendrite — Intro</title>
<style>
  :root{
    --bg:#0D0D0D; --ink:#F5F5F5; --muted:#8E8E8F;
    --green:#10A37F; --green-bright:#19C37D;
    --line:#262626;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1920px;height:1080px;background:var(--bg);overflow:hidden}
  .stage{
    position:relative;width:1920px;height:1080px;
    background:
      radial-gradient(900px 620px at 50% 40%, rgba(16,163,127,0.10), transparent 70%),
      radial-gradient(1400px 900px at 50% 46%, #131313, var(--bg) 75%);
    font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  /* faint grid for depth, very low opacity (atmosphere, not decoration) */
  .grid{position:absolute;inset:0;opacity:0;
    background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
    background-size:64px 64px;
    animation:gridIn 1.2s ease .1s forwards;}
  @keyframes gridIn{to{opacity:1}}

  svg{position:absolute;inset:0;width:1920px;height:1080px}

  .guide{stroke:var(--line);stroke-width:2;fill:none;
    stroke-dasharray:var(--l);stroke-dashoffset:var(--l);
    animation:draw 1.6s ease .4s forwards, dim 0.6s ease 2.3s forwards;}
  .guide-dot{fill:#1C1C1E;stroke:var(--line);stroke-width:2;
    transform-box:fill-box;transform-origin:center;transform:scale(0);opacity:0;
    animation:pop .5s cubic-bezier(.2,1.3,.4,1) forwards, dimNode .6s ease 2.3s forwards;}

  .seg{stroke:var(--green);stroke-width:2.4;fill:none;stroke-linecap:round;
    stroke-dasharray:var(--l);stroke-dashoffset:var(--l);
    filter:drop-shadow(0 0 4px rgba(25,195,125,.35));
    animation:draw var(--dur) cubic-bezier(.25,.7,.3,1) var(--delay) forwards;}
  .tip{transform-box:fill-box;transform-origin:center;transform:scale(0);opacity:0;
    animation:pop .55s cubic-bezier(.2,1.4,.4,1) var(--delay) forwards;}

  .root{transform-box:fill-box;transform-origin:center;}
  .root-core{fill:var(--green);transform-box:fill-box;transform-origin:center;
    transform:scale(0);animation:pop .6s cubic-bezier(.2,1.4,.4,1) .25s forwards;}
  .root-halo{fill:none;stroke:var(--green-bright);stroke-width:2;opacity:0;
    transform-box:fill-box;transform-origin:center;
    animation:pulse 2.6s ease-out .5s infinite;}

  @keyframes draw{to{stroke-dashoffset:0}}
  @keyframes pop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.25);opacity:1}100%{transform:scale(1);opacity:1}}
  @keyframes dim{to{stroke:#1a1a1a;opacity:.5}}
  @keyframes dimNode{to{opacity:.35}}
  @keyframes pulse{0%{transform:scale(1);opacity:.7}70%{opacity:0}100%{transform:scale(3.4);opacity:0}}

  .word{position:absolute;left:0;right:0;top:610px;text-align:center;}
  .word h1{
    font-size:108px;font-weight:700;letter-spacing:.26em;color:var(--ink);
    text-indent:.26em; /* compensate trailing tracking for true centering */
    opacity:0;transform:translateY(14px);
    animation:rise 1.1s cubic-bezier(.2,.7,.2,1) 6.7s forwards;
  }
  .word h1 .a{color:var(--green-bright)}
  .tag{position:absolute;left:0;right:0;top:752px;text-align:center;
    font-family:Georgia,"Times New Roman",serif;font-style:italic;
    font-size:34px;color:var(--muted);letter-spacing:.01em;
    opacity:0;transform:translateY(12px);
    animation:rise 1.1s cubic-bezier(.2,.7,.2,1) 7.6s forwards;}
  @keyframes rise{to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
  <div class="stage">
    <div class="grid"></div>
    <svg id="svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid meet"></svg>
    <div class="word"><h1>DEN<span class="a">D</span>RITE</h1></div>
    <div class="tag">Think in branches, not lines.</div>
  </div>

<script>
const SVG = "http://www.w3.org/2000/svg";
const svg = document.getElementById("svg");
const ROOT = {x:960, y:480};

// ---- deterministic RNG (mulberry32) so every render is identical ----
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const rnd = mulberry32(7);
const jitter = (m)=> (rnd()*2-1)*m;

const segGroup = document.createElementNS(SVG,"g");
const tipGroup = document.createElementNS(SVG,"g");

// ---- helpers ----
function curve(x1,y1,x2,y2){
  // organic cubic: control points along the segment, nudged perpendicular
  const mx=(x1+x2)/2, my=(y1+y2)/2;
  const dx=x2-x1, dy=y2-y1, len=Math.hypot(dx,dy);
  const nx=-dy/len, ny=dx/len;            // unit normal
  const bow=len*0.18*(rnd()>.5?1:-1);
  const cx1=x1+dx*0.35+nx*bow*0.6, cy1=y1+dy*0.35+ny*bow*0.6;
  const cx2=x1+dx*0.7+nx*bow,       cy2=y1+dy*0.7+ny*bow;
  return `M ${x1} ${y1} C ${cx1} ${cy1} ${cx2} ${cy2} ${x2} ${y2}`;
}

// ---- grow the dendrite (canopy biased upward, clear of the wordmark) ----
const segs=[]; const tips=[];
function grow(x,y,angle,length,depth,delay){
  if(depth===0) return;
  const ex = x + Math.cos(angle)*length;
  const ey = y - Math.sin(angle)*length;          // SVG y is down; up = subtract
  segs.push({d:curve(x,y,ex,ey), depth, delay});
  tips.push({x:ex,y:ey, depth, delay:delay+0.32});
  const n = depth>=3 ? 3 : 2;
  const spread = (depth>=3? 0.62 : 0.78);
  for(let i=0;i<n;i++){
    const t = n===1?0:(i-(n-1)/2);
    const childAngle = angle + spread*t + jitter(0.14);
    grow(ex,ey,childAngle,length*0.70,depth-1, delay + 0.62 + i*0.07);
  }
}
// six primaries fanning across the upper hemisphere
const base = -0.18; // overall slight upward lift baked into spread below
const primaries = [2.62, 2.18, 1.74, 1.40, 1.02, 0.52]; // radians, ~150°..30°
primaries.forEach((a,i)=> grow(ROOT.x,ROOT.y,a,168,4, 2.5 + i*0.10));

// ---- straight "linear chat" guide line (the thing we are leaving behind) ----
const gy=ROOT.y;
const guide = document.createElementNS(SVG,"path");
guide.setAttribute("class","guide");
guide.setAttribute("d",`M 720 ${gy} L 1200 ${gy}`);
svg.appendChild(guide);
guide.style.setProperty("--l", guide.getTotalLength());
[720,840,1080,1200].forEach((gx,i)=>{
  const c=document.createElementNS(SVG,"circle");
  c.setAttribute("class","guide-dot");
  c.setAttribute("cx",gx);c.setAttribute("cy",gy);c.setAttribute("r",7);
  c.style.animationDelay=(0.5+i*0.18)+"s, 2.3s";
  svg.appendChild(c);
});

// ---- mount segments + tips ----
svg.appendChild(segGroup); svg.appendChild(tipGroup);
segs.forEach(s=>{
  const p=document.createElementNS(SVG,"path");
  p.setAttribute("class","seg"); p.setAttribute("d",s.d);
  segGroup.appendChild(p);
  const L=p.getTotalLength();
  p.style.setProperty("--l",L);
  p.style.setProperty("--dur",(0.55+s.depth*0.05)+"s");
  p.style.setProperty("--delay",s.delay+"s");
});
tips.forEach(t=>{
  const c=document.createElementNS(SVG,"circle");
  c.setAttribute("class","tip");
  c.setAttribute("cx",t.x);c.setAttribute("cy",t.y);
  c.setAttribute("r", Math.max(3.4, 7 - (4-t.depth)*1.1));
  c.setAttribute("fill", t.depth>=3 ? "#1C1C1E" : "#10A37F");
  c.setAttribute("stroke", "#19C37D");
  c.setAttribute("stroke-width", t.depth>=3 ? 2 : 0);
  c.style.setProperty("--delay",t.delay+"s");
  c.style.filter="drop-shadow(0 0 5px rgba(25,195,125,.5))";
  tipGroup.appendChild(c);
});

// ---- root node on top ----
const halo=document.createElementNS(SVG,"circle");
halo.setAttribute("class","root-halo");
halo.setAttribute("cx",ROOT.x);halo.setAttribute("cy",ROOT.y);halo.setAttribute("r",16);
svg.appendChild(halo);
const core=document.createElementNS(SVG,"circle");
core.setAttribute("class","root-core");
core.setAttribute("cx",ROOT.x);core.setAttribute("cy",ROOT.y);core.setAttribute("r",13);
core.style.filter="drop-shadow(0 0 10px rgba(25,195,125,.7))";
svg.appendChild(core);

// ---- signal the recorder that the first frame has painted ----
document.fonts.ready.then(()=>requestAnimationFrame(()=>{window.__ready=true;}));
</script>
</body>
</html>
