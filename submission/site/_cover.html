<!DOCTYPE html><html lang="zh"><head><meta charset="utf-8"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1080px;height:1440px;overflow:hidden}
  body{background:
      radial-gradient(720px 520px at 50% 16%, rgba(25,195,125,.18), transparent 70%),
      radial-gradient(900px 700px at 50% 100%, #0e1413, #0B0C0C 72%);
    font-family:"PingFang SC","Microsoft YaHei",-apple-system,"Segoe UI",sans-serif;
    color:#F3F5F4;display:flex;flex-direction:column}
  .pad{padding:84px 76px 0}
  .badge{display:inline-flex;align-items:center;gap:10px;font-size:27px;font-weight:700;
    color:#19C37D;background:rgba(25,195,125,.14);border:2px solid rgba(25,195,125,.34);
    padding:13px 24px;border-radius:999px;letter-spacing:.02em}
  h1{font-size:96px;line-height:1.12;font-weight:900;letter-spacing:-.01em;margin:40px 0 0}
  h1 .g{color:#19C37D}
  .sub{font-size:40px;line-height:1.5;color:#C7CECB;margin-top:34px;font-weight:500}
  .sub b{color:#fff;font-weight:800}
  .shotwrap{margin-top:54px;padding:0 60px;flex:1;display:flex;align-items:flex-start}
  .shot{width:100%;border:2px solid #232826;border-radius:28px;overflow:hidden;
    box-shadow:0 50px 110px -40px rgba(0,0,0,.9);background:#141716}
  .shot img{display:block;width:100%}
  .foot{padding:0 76px 70px;display:flex;align-items:center;gap:20px}
  .foot img{width:74px;height:74px;border-radius:18px}
  .foot .t{font-size:40px;font-weight:900;letter-spacing:.01em}
  .foot .s{font-size:26px;color:#9AA3A0;margin-top:4px;font-weight:600}
  .ribbon{position:absolute;top:0;right:0}
</style></head>
<body>
  <div class="pad">
    <span class="badge">📱 端侧 Qwen · MNN · 离线可用</span>
    <h1>别让 AI 聊天<br/><span class="g">越聊越乱</span> 🌿</h1>
    <p class="sub">选中任意一句话 → <b>就地开分支</b><br/>整段对话，长成一棵<b>会生长的思维树</b></p>
  </div>
  <div class="shotwrap"><div class="shot"><img src="img/mindmap.png" alt=""/></div></div>
  <div class="foot">
    <img src="img/logo.png" alt=""/>
    <div>
      <div class="t">Dendrite</div>
      <div class="s">用分支思考，别走直线 · 端云协同</div>
    </div>
  </div>
</body></html>
