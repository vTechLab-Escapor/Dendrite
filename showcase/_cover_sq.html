<!DOCTYPE html><html lang="zh"><head><meta charset="utf-8"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1080px;height:1080px;overflow:hidden}
  body{background:
      radial-gradient(680px 460px at 50% 14%, rgba(25,195,125,.18), transparent 70%),
      radial-gradient(900px 700px at 50% 100%, #0e1413, #0B0C0C 72%);
    font-family:"PingFang SC","Microsoft YaHei",-apple-system,"Segoe UI",sans-serif;
    color:#F3F5F4;display:flex;flex-direction:column}
  .pad{padding:62px 66px 0}
  .badge{display:inline-flex;align-items:center;gap:9px;font-size:24px;font-weight:700;
    color:#19C37D;background:rgba(25,195,125,.14);border:2px solid rgba(25,195,125,.34);
    padding:11px 22px;border-radius:999px}
  h1{font-size:78px;line-height:1.12;font-weight:900;letter-spacing:-.01em;margin:26px 0 0}
  h1 .g{color:#19C37D}
  .sub{font-size:33px;line-height:1.45;color:#C7CECB;margin-top:22px;font-weight:500}
  .sub b{color:#fff;font-weight:800}
  .shotwrap{margin-top:34px;padding:0 56px;flex:1;display:flex;align-items:flex-start;min-height:0}
  .shot{width:100%;border:2px solid #232826;border-radius:24px;overflow:hidden;
    box-shadow:0 44px 100px -40px rgba(0,0,0,.9);background:#141716}
  .shot img{display:block;width:100%}
  .foot{padding:22px 66px 56px;display:flex;align-items:center;gap:18px}
  .foot img{width:64px;height:64px;border-radius:16px}
  .foot .t{font-size:35px;font-weight:900}
  .foot .s{font-size:23px;color:#9AA3A0;margin-top:3px;font-weight:600}
</style></head>
<body>
  <div class="pad">
    <span class="badge">📱 端侧 Qwen · MNN · 离线可用</span>
    <h1>别让 AI 聊天<br/><span class="g">越聊越乱</span> 🌿</h1>
    <p class="sub">选中任意一句话 → <b>就地开分支</b><br/>整段对话，长成一棵<b>会生长的思维树</b></p>
  </div>
  <div class="shotwrap"><div class="shot"><img src="img/mindmap.png" alt=""/></div></div>
  <div class="foot">
    <img src="img/logo.png" alt=""/>
    <div><div class="t">Dendrite</div><div class="s">用分支思考，别走直线 · 端云协同</div></div>
  </div>
</body></html>
