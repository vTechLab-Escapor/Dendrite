<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.
    The path provided below has to start and end with a slash "/" in order for
    it to work correctly. It is replaced by the `--base-href` argument to
    `flutter build`.
  -->
  <base href="/Dendrite/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <title>Dendrite — think in branches, not lines</title>
  <meta name="description" content="An AI-native, non-linear knowledge space. Branch any reply, keep every thread, and navigate your whole conversation as a live mind-map.">
  <meta name="theme-color" content="#0D0D0D">
  <meta name="color-scheme" content="dark">

  <!-- Open Graph / social sharing -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Dendrite">
  <meta property="og:title" content="Dendrite — think in branches, not lines">
  <meta property="og:description" content="An AI-native, non-linear knowledge space. Branch any reply, keep every thread, and navigate your whole conversation as a live mind-map.">
  <meta property="og:image" content="icons/Icon-512.png">

  <!-- Twitter card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Dendrite — think in branches, not lines">
  <meta name="twitter:description" content="An AI-native, non-linear knowledge space. Branch any reply, keep every thread, and navigate your conversation as a live mind-map.">
  <meta name="twitter:image" content="icons/Icon-512.png">

  <!-- iOS / PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dendrite">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Branded splash shown until Flutter paints its first frame.
       Matches the app shell: off-black #0D0D0D base, single teal accent #10A37F. */
    html, body { margin: 0; padding: 0; height: 100%; background: #0D0D0D; }

    #dendrite-splash {
      position: fixed;
      inset: 0;
      z-index: 2147483647;
      display: grid;
      place-items: center;
      /* Off-black base with an ambient, tinted radial glow rather than a flat fill. */
      background:
        radial-gradient(120% 90% at 50% 38%, rgba(16, 163, 127, 0.10) 0%, rgba(16, 163, 127, 0) 55%),
        #0D0D0D;
      color: #ECECEC;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      transition: opacity 480ms ease;
    }
    #dendrite-splash.dendrite-hide { opacity: 0; pointer-events: none; }

    /* Fixed grain overlay to break up the flat surface. */
    #dendrite-splash::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.035;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    }

    .dendrite-stack {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      transform: translateY(-4%);
    }

    .dendrite-mark { width: 92px; height: 92px; display: block; }

    /* Draw-on animation for the branches. */
    .dendrite-mark .branch {
      stroke: #10A37F;
      stroke-width: 2;
      stroke-linecap: round;
      fill: none;
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: dendrite-draw 900ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .dendrite-mark .node {
      fill: #10A37F;
      opacity: 0;
      animation: dendrite-pop 420ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .dendrite-mark .core {
      fill: #13C595;
      transform-origin: 0 0;
      animation: dendrite-pulse 2.4s ease-in-out 1s infinite;
    }

    /* Staggered reveal: branches first, then their terminal nodes. */
    .branch.b1 { animation-delay: 0ms; }
    .branch.b2 { animation-delay: 90ms; }
    .branch.b3 { animation-delay: 180ms; }
    .branch.b4 { animation-delay: 320ms; }
    .branch.b5 { animation-delay: 380ms; }
    .branch.b6 { animation-delay: 440ms; }
    .branch.b7 { animation-delay: 500ms; }
    .node.n1 { animation-delay: 560ms; }
    .node.n2 { animation-delay: 620ms; }
    .node.n3 { animation-delay: 680ms; }
    .node.n4 { animation-delay: 740ms; }
    .node.n5 { animation-delay: 600ms; }

    .dendrite-word {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0;
      opacity: 0;
      animation: dendrite-fade 600ms ease 760ms forwards;
    }
    .dendrite-tagline {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.01em;
      color: #8A8F8C;
      margin: 0;
      opacity: 0;
      animation: dendrite-fade 600ms ease 880ms forwards;
    }

    @keyframes dendrite-draw { to { stroke-dashoffset: 0; } }
    @keyframes dendrite-pop  { from { opacity: 0; transform: scale(0.4); } to { opacity: 1; transform: scale(1); } }
    @keyframes dendrite-fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes dendrite-pulse {
      0%, 100% { transform: scale(1);   opacity: 1; }
      50%      { transform: scale(1.18); opacity: 0.85; }
    }

    @media (prefers-reduced-motion: reduce) {
      .dendrite-mark .branch { stroke-dashoffset: 0; animation: none; }
      .dendrite-mark .node, .dendrite-word, .dendrite-tagline { opacity: 1; animation: none; transform: none; }
      .dendrite-mark .core { animation: none; }
      #dendrite-splash { transition: none; }
    }
  </style>
</head>
<body>
  <!-- Branded loading state. Replaces the default blank white flash while the
       CanvasKit runtime boots. Removed on Flutter's first painted frame. -->
  <div id="dendrite-splash" role="status" aria-label="Loading Dendrite">
    <div class="dendrite-stack">
      <!-- Logo geometry mirrors DendriteLogoPainter in chat_screen.dart. -->
      <svg class="dendrite-mark" viewBox="-28 -28 56 56" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <!-- primary branches from the core -->
        <line class="branch b1" x1="0" y1="0" x2="-12" y2="-12"/>
        <line class="branch b2" x1="0" y1="0" x2="12"  y2="-8"/>
        <line class="branch b3" x1="0" y1="0" x2="-4"  y2="14"/>
        <!-- secondary branches -->
        <line class="branch b4" x1="-12" y1="-12" x2="-18" y2="-10"/>
        <line class="branch b5" x1="-12" y1="-12" x2="-14" y2="-18"/>
        <line class="branch b6" x1="12"  y1="-8"  x2="18"  y2="-16"/>
        <line class="branch b7" x1="12"  y1="-8"  x2="16"  y2="2"/>
        <!-- terminal nodes -->
        <circle class="node n1" cx="-18" cy="-10" r="1.5"/>
        <circle class="node n2" cx="-14" cy="-18" r="1.5"/>
        <circle class="node n3" cx="18"  cy="-16" r="1.5"/>
        <circle class="node n4" cx="16"  cy="2"   r="1.5"/>
        <circle class="node n5" cx="-4"  cy="14"  r="2"/>
        <!-- core node -->
        <circle class="node core" cx="0" cy="0" r="4"/>
      </svg>
      <p class="dendrite-word">Dendrite</p>
      <p class="dendrite-tagline">Think in branches, not lines.</p>
    </div>
  </div>

  <script>
    // Fade out the splash once Flutter has painted, with a safety fallback.
    (function () {
      var splash = document.getElementById('dendrite-splash');
      var done = false;
      function dismiss() {
        if (done || !splash) return;
        done = true;
        splash.classList.add('dendrite-hide');
        splash.addEventListener('transitionend', function () {
          if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
        }, { once: true });
      }
      window.addEventListener('flutter-first-frame', dismiss);
      // Fallback in case the event is missed (e.g. very fast boot from cache).
      window.setTimeout(dismiss, 12000);
    })();
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
